# =============================================================================
# evtol_frozen_baseline — self-contained config
# =============================================================================
# Stage 0: preliminary frozen-DINOv2 analysis.
# Fill in every value marked EDIT-ME before running. Paths under `paths:` are
# resolved relative to the folder root (the directory containing this file)
# unless given as absolute paths.
# =============================================================================

paths:
  image_dir: "/mnt/storage_11tb/Drive_files_to_syncronize/3 - Images DataSets & Labelling Outputs/1627_DS/Shrouded vs Openrotor/Images Processed"        # folder of per-figure PNGs (scanned recursively)
  labels_excel: "/mnt/storage_11tb/Drive_files_to_syncronize/2 - Patente & Validation/3 -Raw_Patent_Exports_PatSeer_&Gold_Standard/1639__dataset_08_06_26.xlsx"     # the labelled PatSeer Excel
  output_dir: "/mnt/storage_11tb/Drive_files_to_syncronize/4 - Intelligence Models & Post Process Outputs/Preliminary_analysis/outputs/analysis"

data:
  patent_id_col: "Record Number"          # column in the Excel holding the patent id
  # NOTE: shrouded_open (SHR/OPN) comes from the FILENAME (parse_patent_id), not
  # the Excel — list_figures already provides it as a per-figure column.
  label_cols: []                          # Excel-sourced labels only; add real columns here when needed
  confound_cols:                          # joined by patent_id; derived axes (filing_year, is_bell) built in analysis
    - "Assignee"
    - "Assignee Country"
    - "Filing/Application Date"
    - "Publication Country"

analysis:
  model: "facebook/dinov2-large"
  layers: [18, 22, 24]
  pooling: [cls, mean_patch]
  batch_size: 32
  device: "cuda:1"
  aggregation:
    method: "mean"          # swappable later: mean | canonical | per_figure_type
  seed: 42
